<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statement → CSV — Card Index</title>
<style>
  :root{
    --paper:#F6F3EC;
    --ink:#1B2420;
    --teal:#1F4B43;
    --brass:#AD8A4E;
    --rust:#9C3B2E;
    --line: rgba(27,36,32,0.14);
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "Roboto Mono", Consolas, "Courier New", monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  html,body{ margin:0; padding:0; }
  *{ box-sizing:border-box; }

  .hub-app{
    font-family:var(--sans);
    background:var(--paper);
    color:var(--ink);
    padding:28px 22px 56px;
    max-width:980px;
    margin:0 auto;
    min-height:100vh;
    line-height:1.45;
  }
  .hub-eyebrow{
    font-family:var(--mono);
    text-transform:uppercase;
    letter-spacing:.14em;
    font-size:11px;
    font-weight:700;
    color:var(--brass);
    margin-bottom:8px;
  }
  .hub-title{
    font-family:var(--mono);
    font-weight:700;
    font-size:clamp(22px,4.5vw,30px);
    letter-spacing:-0.01em;
    margin:0 0 10px;
  }
  .hub-subtitle{
    font-size:14px;
    color:rgba(27,36,32,0.72);
    max-width:560px;
    margin:0 0 26px;
  }

  /* perforated tear-strip */
  .hub-perforation{
    height:12px;
    background:var(--teal);
    background-image:radial-gradient(circle at center, var(--paper) 5px, transparent 5.5px);
    background-size:16px 12px;
    background-repeat:repeat-x;
    background-position:center;
    border-radius:4px 4px 0 0;
  }
  .hub-index-header{
    background:var(--teal);
    color:var(--paper);
    padding:14px 18px;
    border-radius:0 0 8px 8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:18px;
  }
  .hub-index-header .hub-eyebrow{ color:rgba(246,243,236,0.7); margin-bottom:0; }
  .hub-count{ font-family:var(--mono); font-size:12px; color:rgba(246,243,236,0.75); }

  .hub-table-wrap{ overflow-x:auto; border:1px solid var(--line); border-radius:8px; }
  .hub-table{ width:100%; border-collapse:collapse; min-width:580px; font-size:13.5px; }
  .hub-table thead th{
    text-align:left;
    font-family:var(--mono);
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:.08em;
    color:rgba(27,36,32,0.6);
    padding:10px 14px;
    border-bottom:1px solid var(--line);
    background:rgba(173,138,78,0.07);
  }
  .hub-table td{ border-bottom:1px solid var(--line); padding:13px 14px; vertical-align:middle; }
  .hub-row{ cursor:pointer; transition:background .12s ease; }
  .hub-row:hover{ background:rgba(173,138,78,0.10); }
  .hub-row:last-child td{ border-bottom:none; }

  .hub-card-name{ font-weight:700; }
  .hub-version-tag{
    display:inline-block;
    margin-left:8px;
    font-family:var(--mono);
    font-size:10px;
    font-weight:700;
    letter-spacing:.04em;
    padding:2px 7px;
    border-radius:4px;
    vertical-align:middle;
  }
  .tag-new{ background:var(--teal); color:var(--paper); }
  .tag-old{ background:rgba(27,36,32,0.12); color:rgba(27,36,32,0.7); }

  .hub-card-issuer{ color:rgba(27,36,32,0.65); font-size:13px; }
  .hub-card-note{ color:rgba(27,36,32,0.5); font-size:12px; margin-top:2px; }

  .hub-row-cta{ text-align:right; white-space:nowrap; }
  .hub-row-cta a{
    font-family:var(--mono);
    font-size:12px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.04em;
    color:var(--teal);
    text-decoration:none;
  }
  .hub-row:hover .hub-row-cta a{ text-decoration:underline; }

  .hub-footnote{
    margin-top:18px;
    font-family:var(--mono);
    font-size:11.5px;
    letter-spacing:.02em;
    color:rgba(27,36,32,0.5);
  }

  @media (max-width:560px){
    .hub-app{ padding:20px 14px 40px; }
    .hub-index-header{ flex-direction:column; align-items:flex-start; }
    .hub-card-note{ display:none; }
  }
</style>
</head>
<body>

<div class="hub-app">
  <div class="hub-eyebrow">Statement → Ledger</div>
  <h1 class="hub-title">Pick your card</h1>
  <p class="hub-subtitle">Each card has its own parser tuned to that bank's layout. Open one, drop in the PDF, review the rows, download the CSV. Everything runs in your browser.</p>

  <div class="hub-perforation"></div>
  <div class="hub-index-header">
    <div class="hub-eyebrow">Card Index</div>
    <div class="hub-count" id="hub-count"></div>
  </div>

  <div class="hub-table-wrap">
    <table class="hub-table">
      <thead>
        <tr><th>Card</th><th>Issuer</th><th></th></tr>
      </thead>
      <tbody id="hub-tbody"></tbody>
    </table>
  </div>

  <div class="hub-footnote">New cards get added to this list as their parsers are built.</div>
</div>

<script>
  // ── SINGLE PLACE TO EXTEND ──────────────────────────────────────────────
  // Add a new entry here when a new parser is built.
  //
  // Fields:
  //   name    – card display name
  //   issuer  – issuing bank
  //   note    – one-line hint about the statement format / special features
  //   file    – filename of the parser HTML (must be in the same folder)
  //   tag     – optional: "new" or "old" (renders a coloured badge beside the name)
  // ────────────────────────────────────────────────────────────────────────
  const CARDS = [
    {
      name:   "YES BANK KreditPe ACE",
      issuer: "YES Bank",
      note:   "Rupay e-statement, digital PDF",
      file:   "yesbank-ace.html"
    },
    {
      name:   "Jupiter CSB edge+",
      issuer: "CSB Bank, via Jupiter",
      note:   "Supports multiple PDFs; per-statement validation",
      file:   "jupiter-csb.html"
    },
    {
      name:   "HDFC Millennia",
      tag:    "new",
      issuer: "HDFC Bank",
      note:   "Multi-file merge; EMI badge stripped automatically",
      file:   "hdfc-millennia.html"
    },
    {
      name:   "HDFC Millennia",
      tag:    "old",
      issuer: "HDFC Bank",
      note:   "Legacy parser — use only if the new one fails on older statements",
      file:   "hdfc-millennia-old.html"
    },
    {
      name:   "Amazon Pay ICICI",
      issuer: "ICICI Bank, via Amazon",
      note:   "Multiple statement PDFs merged into one CSV",
      file:   "amazon-pay-icici.html"
    },
    {
      name:   "Airtel Axis Bank",
      issuer: "Axis Bank, via Airtel",
      note:   "Multiple statement PDFs supported",
      file:   "airtel-axis.html"
    },
    {
      name:   "RBL IndianOil XTRA",
      issuer: "RBL Bank",
      note:   "v1 parser — gift-icon detection, fuel summary, statement reconciliation",
      file:   "rbl-indianoil-xtra.html"
    }
  ];
  // ────────────────────────────────────────────────────────────────────────

  const tbody   = document.getElementById('hub-tbody');
  const countEl = document.getElementById('hub-count');

  CARDS.forEach(card => {
    const tr = document.createElement('tr');
    tr.className = 'hub-row';
    tr.tabIndex = 0;

    // name cell (with optional version tag)
    const nameTd = document.createElement('td');
    const nameSpan = document.createElement('span');
    nameSpan.className = 'hub-card-name';
    nameSpan.textContent = card.name;
    nameTd.appendChild(nameSpan);
    if (card.tag) {
      const badge = document.createElement('span');
      badge.className = 'hub-version-tag ' + (card.tag === 'new' ? 'tag-new' : 'tag-old');
      badge.textContent = card.tag === 'new' ? 'New parser' : 'Old parser';
      nameTd.appendChild(badge);
    }
    if (card.note) {
      const noteDiv = document.createElement('div');
      noteDiv.className = 'hub-card-note';
      noteDiv.textContent = card.note;
      nameTd.appendChild(noteDiv);
    }

    // issuer cell
    const issuerTd = document.createElement('td');
    issuerTd.className = 'hub-card-issuer';
    issuerTd.textContent = card.issuer;

    // cta cell
    const ctaTd = document.createElement('td');
    ctaTd.className = 'hub-row-cta';
    const link = document.createElement('a');
    link.href = card.file;
    link.textContent = 'Open →';
    ctaTd.appendChild(link);

    tr.appendChild(nameTd);
    tr.appendChild(issuerTd);
    tr.appendChild(ctaTd);

    tr.addEventListener('click', e => { if (e.target.tagName !== 'A') location.href = card.file; });
    tr.addEventListener('keydown', e => { if (e.key === 'Enter') location.href = card.file; });

    tbody.appendChild(tr);
  });

  countEl.textContent = CARDS.length + ' cards';
</script>

</body>
</html>
